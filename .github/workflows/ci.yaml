name: CI

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - 'graphite-base/**'

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}-${{ github.ref == 'refs/heads/master' && github.sha || ''}}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

# Nix is installed via nix-quick-install-action and both the shared
# `rainlanguage` Cachix (cachix-action) and the per-runner nix store
# (cache-nix-action) are warmed before any `nix` invocation. This replaces the
# old DeterminateSystems installer + magic-nix-cache + custom ABI-prefetch job,
# which did not share the `rainlanguage` cache that raindex CI populates.

jobs:
  backend-build:
    name: backend build
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 30
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TARGET_DIR: target/test
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git fetch fail-fast
        run: |
          git config --global http.lowSpeedLimit 524288
          git config --global http.lowSpeedTime 60

      - uses: nixbuild/nix-quick-install-action@v34
        with:
          # Nix 2.24-2.28 fail to resolve rainix's overridden `foundry` input
          # (`cannot find flake 'flake:foundry'`); the fix landed in 2.30. v30
          # of this action only shipped up to 2.26, so use v34 and pin a
          # working release.
          nix_version: "2.31.2"
          nix_conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            keep-env-derivations = true
            keep-outputs = true

      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: rainlanguage
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: rust-${{ github.workflow }}
          workspaces: ". -> target/test"

      # Build the test binaries once into a nextest archive shared by all four
      # partitions, and run clippy here since this is the single full compile.
      - name: Build nextest archive and run clippy
        run: |
          nix develop .#ci-backend -c bash -c '
            set -euxo pipefail
            cargo nextest archive --workspace --all-features --profile ci \
              --archive-file "$RUNNER_TEMP/nextest-archive.tar.zst"
            cargo clippy --workspace --all-targets --all-features
            # compile_fail_tests (trybuild) shells out to cargo at run time, so
            # run it here where the workspace build cache is warm. The archive
            # partitions only carry prebuilt binaries and would compile it cold.
            cargo nextest run --workspace --all-features --profile ci \
              -E "test(compile_fail_tests)"
          '

      - name: Upload nextest archive
        uses: actions/upload-artifact@v4
        with:
          name: nextest-archive
          path: ${{ runner.temp }}/nextest-archive.tar.zst
          retention-days: 1
          if-no-files-found: error

  backend-test:
    name: backend test ${{ matrix.partition }} of 4
    needs: backend-build
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 30
    strategy:
      fail-fast: false

      matrix:
        partition: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git fetch fail-fast
        run: |
          git config --global http.lowSpeedLimit 524288
          git config --global http.lowSpeedTime 60

      - uses: nixbuild/nix-quick-install-action@v34
        with:
          # Nix 2.24-2.28 fail to resolve rainix's overridden `foundry` input
          # (`cannot find flake 'flake:foundry'`); the fix landed in 2.30. v30
          # of this action only shipped up to 2.26, so use v34 and pin a
          # working release.
          nix_version: "2.31.2"
          nix_conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            keep-env-derivations = true
            keep-outputs = true

      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: rainlanguage
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G

      - name: Download nextest archive
        uses: actions/download-artifact@v4
        with:
          name: nextest-archive
          path: ${{ runner.temp }}

      # Test binaries come from the archive built in backend-build; no recompile.
      - name: test ${{ matrix.partition }} of 4
        run: |
          nix develop .#ci-backend -c bash -c '
            set -euxo pipefail
            cargo nextest run --archive-file "$RUNNER_TEMP/nextest-archive.tar.zst" \
              --workspace-remap . --profile ci \
              -E "not test(compile_fail_tests)" \
              --partition hash:${{ matrix.partition }}/4
          '

  backend:
    name: backend
    needs: [backend-build, backend-test]
    if: always()
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 25
    steps:
      - name: Check backend validation
        run: |
          if [ "${{ needs.backend-build.result }}" != "success" ] || [ "${{ needs.backend-test.result }}" != "success" ]; then
            echo "backend validation failed"
            exit 1
          fi

  dashboard:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git fetch fail-fast
        run: |
          git config --global http.lowSpeedLimit 524288
          git config --global http.lowSpeedTime 60

      - uses: nixbuild/nix-quick-install-action@v34
        with:
          # Nix 2.24-2.28 fail to resolve rainix's overridden `foundry` input
          # (`cannot find flake 'flake:foundry'`); the fix landed in 2.30. v30
          # of this action only shipped up to 2.26, so use v34 and pin a
          # working release.
          nix_version: "2.31.2"
          nix_conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            keep-env-derivations = true
            keep-outputs = true

      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: rainlanguage
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G

      - name: Check bun.nix is up to date
        run: |
          nix run .#genBunNix
          nix fmt -- dashboard/bun.nix
          git diff --exit-code dashboard/bun.nix

      - name: Generate dashboard API bindings
        run: nix run .#st0x-dto -- dashboard/src/lib/api

      - name: Dashboard lint
        working-directory: dashboard
        run: |
          nix develop "$GITHUB_WORKSPACE#ci-dashboard" -c bun install --frozen-lockfile
          nix develop "$GITHUB_WORKSPACE#ci-dashboard" -c bun run lint

      - name: Dashboard
        run: nix build .#st0x-dashboard

  hooks:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git fetch fail-fast
        run: |
          git config --global http.lowSpeedLimit 524288
          git config --global http.lowSpeedTime 60

      - uses: nixbuild/nix-quick-install-action@v34
        with:
          # Nix 2.24-2.28 fail to resolve rainix's overridden `foundry` input
          # (`cannot find flake 'flake:foundry'`); the fix landed in 2.30. v30
          # of this action only shipped up to 2.26, so use v34 and pin a
          # working release.
          nix_version: "2.31.2"
          nix_conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            keep-env-derivations = true
            keep-outputs = true

      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: rainlanguage
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G

      - name: deploy migration invariants
        run: ./scripts/validate-deploy-migration.sh

      - name: pre-commit hooks
        run: nix develop .#ci-hooks -c pre-commit run --all-files
