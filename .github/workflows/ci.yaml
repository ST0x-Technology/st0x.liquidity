name: CI

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - 'graphite-base/**'

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}-${{ github.ref == 'refs/heads/master' && github.sha || ''}}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  nix-source-cache:
    name: nix source cache
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git fetch fail-fast
        run: |
          git config --global http.lowSpeedLimit 524288
          git config --global http.lowSpeedTime 60

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Restore Nix source cache
        id: nix-source-cache
        uses: actions/cache@v4
        with:
          path: |
            .tmp/nix-ci-cache
            .tmp/nix-ci-cache-paths.txt
          key: nix-source-abi-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'flake.nix', 'nix/*.nix') }}

      - name: Populate Nix source cache
        if: steps.nix-source-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail

          cache_dir="$GITHUB_WORKSPACE/.tmp/nix-ci-cache"
          archive_json="$GITHUB_WORKSPACE/.tmp/nix-ci-cache-flake-archive.json"
          abi_outputs="$GITHUB_WORKSPACE/.tmp/nix-ci-cache-abi-outputs.txt"
          paths_file="$GITHUB_WORKSPACE/.tmp/nix-ci-cache-paths.txt"

          mkdir -p "$cache_dir"

          retry() {
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi

              if [ "$attempt" = 3 ]; then
                return 1
              fi

              sleep "$((attempt * 15))"
            done
          }

          retry bash -c 'nix flake archive --json --to "$1" . > "$2"' \
            _ "file://$cache_dir" "$archive_json"

          jq -r '[.. | objects | select(has("path")) | .path] | unique | .[]' \
            "$archive_json" > "$paths_file"

          retry bash -c 'nix build --no-link --print-out-paths .#forgeStd .#rainOrderbook .#pyth > "$1"' \
            _ "$abi_outputs"

          retry bash -c 'xargs nix copy --to "$1" < "$2"' \
            _ "file://$cache_dir" "$abi_outputs"

          xargs nix path-info -r < "$abi_outputs" >> "$paths_file"
          sort -u "$paths_file" -o "$paths_file"

  backend-validation:
    name: backend test ${{ matrix.partition }} of 4
    needs: nix-source-cache
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 30
    strategy:
      fail-fast: false

      matrix:
        partition: [1, 2, 3, 4]

    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TARGET_DIR: target/test
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git fetch fail-fast
        run: |
          git config --global http.lowSpeedLimit 524288
          git config --global http.lowSpeedTime 60

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true

      - name: Restore Nix source cache
        id: nix-source-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .tmp/nix-ci-cache
            .tmp/nix-ci-cache-paths.txt
          key: nix-source-abi-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'flake.nix', 'nix/*.nix') }}
          # A miss must not fail the job. GitHub's 10GB cache can evict the
          # nix-source-abi entry between the populate job saving it and this
          # restore (especially under concurrent load), so on a miss we skip the
          # import below and let `nix develop .#ci-backend` build the ABIs from
          # source. Slower, but the build stays green instead of hard-failing.
          fail-on-cache-miss: false

      - name: Import Nix source cache
        if: steps.nix-source-cache.outputs.cache-hit == 'true'
        run: |
          nix copy \
            --from "file://$GITHUB_WORKSPACE/.tmp/nix-ci-cache" \
            --no-check-sigs \
            --stdin < "$GITHUB_WORKSPACE/.tmp/nix-ci-cache-paths.txt"

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git/db/
            ~/.cargo/registry/cache/
            ~/.cargo/registry/index/
            target/test/
          key: cargo-${{ runner.os }}-${{ runner.arch }}-test-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'flake.lock', 'flake.nix', 'rust.nix') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-test-

      # Each partition builds the full test binaries, so clippy reuses the warm
      # target/test cache instead of compiling the workspace into a separate
      # dir. It only needs to run once, so it rides on partition 1.
      - name: test ${{ matrix.partition }} of 4
        run: |
          nix develop .#ci-backend -c bash -c '
            set -euxo pipefail
            cargo nextest run --workspace --all-features --profile ci \
              --partition hash:${{ matrix.partition }}/4
            if [ "${{ matrix.partition }}" = "1" ]; then
              cargo clippy --workspace --all-targets --all-features
            fi
          '

  backend:
    name: backend
    needs: backend-validation
    if: always()
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 25
    steps:
      - name: Check backend validation
        run: |
          if [ "${{ needs.backend-validation.result }}" != "success" ]; then
            echo "backend validation failed"
            exit 1
          fi

  dashboard:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git fetch fail-fast
        run: |
          git config --global http.lowSpeedLimit 524288
          git config --global http.lowSpeedTime 60

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Check bun.nix is up to date
        run: |
          nix run .#genBunNix
          nix fmt -- dashboard/bun.nix
          git diff --exit-code dashboard/bun.nix

      - name: Generate dashboard API bindings
        run: nix run .#st0x-dto -- dashboard/src/lib/api

      - name: Dashboard lint
        working-directory: dashboard
        run: |
          nix develop "$GITHUB_WORKSPACE#ci-dashboard" -c bun install --frozen-lockfile
          nix develop "$GITHUB_WORKSPACE#ci-dashboard" -c bun run lint

      - name: Dashboard
        run: nix build .#st0x-dashboard

  hooks:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git fetch fail-fast
        run: |
          git config --global http.lowSpeedLimit 524288
          git config --global http.lowSpeedTime 60

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: deploy migration invariants
        run: ./scripts/validate-deploy-migration.sh

      - name: pre-commit hooks
        run: nix develop .#ci-hooks -c pre-commit run --all-files
