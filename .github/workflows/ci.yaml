name: CI
on: [push]

concurrency:
  group: ${{ github.ref }}-ci
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  id-token: write
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute submodule cache key
        id: sub-key
        run: echo "hash=$(git submodule status | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache submodules
        id: cache-sub
        uses: actions/cache@v4
        with:
          path: |
            lib/
            .git/modules/
          key: submodules-${{ steps.sub-key.outputs.hash }}
          restore-keys: submodules-

      - name: Checkout submodules
        run: |
          if [ "${{ steps.cache-sub.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit — trying no-fetch checkout"
            git submodule update --init --recursive --no-fetch || {
              echo "no-fetch failed — falling back to full fetch"
              git submodule update --init --recursive
            }
          else
            echo "Cache miss — full submodule fetch"
            git submodule update --init --recursive
          fi

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Solidity artifacts
        run: nix run .#prepSolArtifacts

      - name: Initialize dev shell
        run: nix develop -c true

      - name: Setup database
        run: nix develop -c sqlx db reset -y --source services/hedge/migrations

      - name: Validate standalone build
        run: nix develop -c cargo check --workspace

      - name: Test
        run: nix develop -c cargo nextest run --workspace --all-features

      - name: Clippy
        run: |
          nix develop -c cargo clippy \
            --workspace --all-targets --all-features

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute submodule cache key
        id: sub-key
        run: echo "hash=$(git submodule status | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache submodules
        id: cache-sub
        uses: actions/cache@v4
        with:
          path: |
            lib/
            .git/modules/
          key: submodules-${{ steps.sub-key.outputs.hash }}
          restore-keys: submodules-

      - name: Checkout submodules
        run: |
          if [ "${{ steps.cache-sub.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit — trying no-fetch checkout"
            git submodule update --init --recursive --no-fetch || {
              echo "no-fetch failed — falling back to full fetch"
              git submodule update --init --recursive
            }
          else
            echo "Cache miss — full submodule fetch"
            git submodule update --init --recursive
          fi

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Solidity artifacts
        run: nix run .#prepSolArtifacts

      - name: Check bun.nix is up to date
        run: |
          nix run .#genBunNix
          nix fmt -- dashboard/bun.nix
          git diff --exit-code dashboard/bun.nix

      - name: Dashboard
        run: nix build --impure .#st0x-dashboard

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: pre-commit hooks
        run: nix develop -c pre-commit run --all-files
