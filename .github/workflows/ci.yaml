name: CI/CD

on:
  workflow_dispatch:
  push:

permissions:
  id-token: write
  contents: read

jobs:
  backend:
    concurrency:
      group: ${{ github.ref }}-backend
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1

      - uses: actions/checkout@v4

      - name: Compute submodule cache key
        id: sub-key
        run: echo "hash=$(git submodule status | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache submodules
        id: cache-sub
        uses: actions/cache@v4
        with:
          path: |
            lib/
            .git/modules/
          key: submodules-${{ steps.sub-key.outputs.hash }}
          restore-keys: submodules-

      - name: Checkout submodules
        run: |
          if [ "${{ steps.cache-sub.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit — trying no-fetch checkout"
            git submodule update --init --recursive --no-fetch || {
              echo "no-fetch failed — falling back to full fetch"
              git submodule update --init --recursive
            }
          else
            echo "Cache miss — full submodule fetch"
            git submodule update --init --recursive
          fi

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Solidity artifacts
        run: nix run .#prepSolArtifacts

      - name: Initialize dev shell
        run: nix develop -c true

      - name: Setup database
        run: nix develop -c sqlx db reset -y

      - name: Validate standalone build
        run: nix develop -c cargo check --workspace

      - name: Test
        run: |
          nix develop -c cargo nextest run \
            --workspace --all-features --profile ci

      - name: Clippy
        run: |
          nix develop -c cargo clippy \
            --workspace --all-targets --all-features \
            -- -D clippy::all -D warnings

  dashboard:
    concurrency:
      group: ${{ github.ref }}-dashboard
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute submodule cache key
        id: sub-key
        run: echo "hash=$(git submodule status | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache submodules
        id: cache-sub
        uses: actions/cache@v4
        with:
          path: |
            lib/
            .git/modules/
          key: submodules-${{ steps.sub-key.outputs.hash }}
          restore-keys: submodules-

      - name: Checkout submodules
        run: |
          if [ "${{ steps.cache-sub.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit — trying no-fetch checkout"
            git submodule update --init --recursive --no-fetch || {
              echo "no-fetch failed — falling back to full fetch"
              git submodule update --init --recursive
            }
          else
            echo "Cache miss — full submodule fetch"
            git submodule update --init --recursive
          fi

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Solidity artifacts
        run: nix run .#prepSolArtifacts

      - name: Check bun.nix is up to date
        run: |
          nix run .#genBunNix
          nix fmt -- dashboard/bun.nix
          git diff --exit-code dashboard/bun.nix

      - name: Dashboard
        run: nix build --impure .#st0x-dashboard

  hooks:
    concurrency:
      group: ${{ github.ref }}-flake
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: pre-commit hooks
        run: nix develop -c pre-commit run --all-files

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: [backend, dashboard, hooks]
    concurrency:
      group: deploy
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Resolve and mask host IP
        run: |
          host_ip=$(nix run .#resolveIp)
          echo "::add-mask::$host_ip"
          host_key=$(nix eval --raw --file keys.nix keys.host)
          echo "$host_ip $host_key" > ~/.ssh/known_hosts

      - name: Build Solidity artifacts
        run: nix run .#prepSolArtifacts

      - name: Deploy
        run: nix run .#deployAll

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh/id_ed25519
