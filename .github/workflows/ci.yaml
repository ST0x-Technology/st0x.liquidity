name: CI

on:
  workflow_dispatch:
  push:

permissions:
  id-token: write
  contents: read

jobs:
  backend-validation:
    name: backend ${{ matrix.name }}
    concurrency:
      group: ${{ github.ref }}-backend-${{ matrix.name }}
      cancel-in-progress: true
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: check
            command: nix develop -c cargo check --workspace
          - name: test 1 of 4
            command: >
              nix develop -c cargo nextest run --workspace --all-features
              --profile ci --partition hash:1/4
          - name: test 2 of 4
            command: >
              nix develop -c cargo nextest run --workspace --all-features
              --profile ci --partition hash:2/4
          - name: test 3 of 4
            command: >
              nix develop -c cargo nextest run --workspace --all-features
              --profile ci --partition hash:3/4
          - name: test 4 of 4
            command: >
              nix develop -c cargo nextest run --workspace --all-features
              --profile ci --partition hash:4/4
          - name: clippy
            command: >
              nix develop -c cargo clippy --workspace --all-targets
              --all-features -- -D clippy::all -D warnings
    steps:
      - uses: actions/checkout@v4

      - name: Compute submodule cache key
        id: sub-key
        run: echo "hash=$(git submodule status | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache submodules
        id: cache-sub
        uses: actions/cache@v4
        with:
          path: |
            lib/
            .git/modules/
          key: submodules-${{ steps.sub-key.outputs.hash }}
          restore-keys: submodules-

      - name: Checkout submodules
        run: |
          if [ "${{ steps.cache-sub.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit — trying no-fetch checkout"
            git submodule update --init --recursive --no-fetch || {
              echo "no-fetch failed — falling back to full fetch"
              git submodule update --init --recursive
            }
          else
            echo "Cache miss — full submodule fetch"
            git submodule update --init --recursive
          fi

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Solidity artifacts
        run: nix run .#prepSolArtifacts

      - name: Initialize dev shell
        run: nix develop -c true

      - name: Setup database
        run: nix develop -c sqlx db reset -y

      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}

  backend:
    name: backend
    needs: backend-validation
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check backend validation
        run: |
          if [ "${{ needs.backend-validation.result }}" != "success" ]; then
            echo "backend validation failed"
            exit 1
          fi

  dashboard:
    concurrency:
      group: ${{ github.ref }}-dashboard
      cancel-in-progress: true
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Compute submodule cache key
        id: sub-key
        run: echo "hash=$(git submodule status | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache submodules
        id: cache-sub
        uses: actions/cache@v4
        with:
          path: |
            lib/
            .git/modules/
          key: submodules-${{ steps.sub-key.outputs.hash }}
          restore-keys: submodules-

      - name: Checkout submodules
        run: |
          if [ "${{ steps.cache-sub.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit — trying no-fetch checkout"
            git submodule update --init --recursive --no-fetch || {
              echo "no-fetch failed — falling back to full fetch"
              git submodule update --init --recursive
            }
          else
            echo "Cache miss — full submodule fetch"
            git submodule update --init --recursive
          fi

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Solidity artifacts
        run: nix run .#prepSolArtifacts

      - name: Check bun.nix is up to date
        run: |
          nix run .#genBunNix
          nix fmt -- dashboard/bun.nix
          git diff --exit-code dashboard/bun.nix

      - name: Dashboard
        run: nix build --impure .#st0x-dashboard

  hooks:
    concurrency:
      group: ${{ github.ref }}-flake
      cancel-in-progress: true
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: pre-commit hooks
        run: nix develop -c pre-commit run --all-files
