name: CI

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - 'graphite-base/**'

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}-${{ github.ref == 'refs/heads/master' && github.sha || ''}}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  nix-source-cache:
    name: nix source cache
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git fetch fail-fast
        run: |
          git config --global http.lowSpeedLimit 524288
          git config --global http.lowSpeedTime 60

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Restore Nix source cache
        id: nix-source-cache
        uses: actions/cache@v4
        with:
          path: |
            .tmp/nix-ci-cache
            .tmp/nix-ci-cache-paths.txt
          key: nix-source-abi-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'flake.nix', 'nix/*.nix') }}

      - name: Populate Nix source cache
        if: steps.nix-source-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail

          cache_dir="$GITHUB_WORKSPACE/.tmp/nix-ci-cache"
          archive_json="$GITHUB_WORKSPACE/.tmp/nix-ci-cache-flake-archive.json"
          abi_outputs="$GITHUB_WORKSPACE/.tmp/nix-ci-cache-abi-outputs.txt"
          paths_file="$GITHUB_WORKSPACE/.tmp/nix-ci-cache-paths.txt"

          mkdir -p "$cache_dir"

          retry() {
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi

              if [ "$attempt" = 3 ]; then
                return 1
              fi

              sleep "$((attempt * 15))"
            done
          }

          retry bash -c 'nix flake archive --json --to "$1" . > "$2"' \
            _ "file://$cache_dir" "$archive_json"

          jq -r '[.. | objects | select(has("path")) | .path] | unique | .[]' \
            "$archive_json" > "$paths_file"

          retry bash -c 'nix build --no-link --print-out-paths .#forgeStd .#rainOrderbook .#pyth > "$1"' \
            _ "$abi_outputs"

          retry bash -c 'xargs nix copy --to "$1" < "$2"' \
            _ "file://$cache_dir" "$abi_outputs"

          xargs nix path-info -r < "$abi_outputs" >> "$paths_file"
          sort -u "$paths_file" -o "$paths_file"

  backend-validation:
    name: backend ${{ matrix.name }}
    needs: nix-source-cache
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 60
    strategy:
      fail-fast: false

      matrix:
        include:
          - name: check
            cache_target: check
            command: nix develop .#ci-backend -c cargo check --workspace

          - name: test 1 of 4
            cache_target: test
            command: >
              nix develop .#ci-backend -c cargo nextest run --workspace
              --all-features --profile ci --partition hash:1/4

          - name: test 2 of 4
            cache_target: test
            command: >
              nix develop .#ci-backend -c cargo nextest run --workspace
              --all-features --profile ci --partition hash:2/4

          - name: test 3 of 4
            cache_target: test
            command: >
              nix develop .#ci-backend -c cargo nextest run --workspace
              --all-features --profile ci --partition hash:3/4

          - name: test 4 of 4
            cache_target: test
            command: >
              nix develop .#ci-backend -c cargo nextest run --workspace
              --all-features --profile ci --partition hash:4/4

          - name: clippy
            cache_target: clippy
            command: >
              nix develop .#ci-backend -c cargo clippy --workspace
              --all-targets --all-features

    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TARGET_DIR: target/${{ matrix.cache_target }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git fetch fail-fast
        run: |
          git config --global http.lowSpeedLimit 524288
          git config --global http.lowSpeedTime 60

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true

      - name: Restore Nix source cache
        id: nix-source-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .tmp/nix-ci-cache
            .tmp/nix-ci-cache-paths.txt
          key: nix-source-abi-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'flake.nix', 'nix/*.nix') }}
          fail-on-cache-miss: true

      - name: Import Nix source cache
        run: |
          nix copy \
            --from "file://$GITHUB_WORKSPACE/.tmp/nix-ci-cache" \
            --no-check-sigs \
            --stdin < "$GITHUB_WORKSPACE/.tmp/nix-ci-cache-paths.txt"

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git/db/
            ~/.cargo/registry/cache/
            ~/.cargo/registry/index/
            target/${{ matrix.cache_target }}/
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ matrix.cache_target }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'flake.lock', 'flake.nix', 'rust.nix') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-${{ matrix.cache_target }}-

      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}

  backend:
    name: backend
    needs: backend-validation
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check backend validation
        run: |
          if [ "${{ needs.backend-validation.result }}" != "success" ]; then
            echo "backend validation failed"
            exit 1
          fi

  dashboard:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git fetch fail-fast
        run: |
          git config --global http.lowSpeedLimit 524288
          git config --global http.lowSpeedTime 60

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Check bun.nix is up to date
        run: |
          nix run .#genBunNix
          nix fmt -- dashboard/bun.nix
          git diff --exit-code dashboard/bun.nix

      - name: Generate dashboard API bindings
        run: nix run .#st0x-dto -- dashboard/src/lib/api

      - name: Dashboard lint
        working-directory: dashboard
        run: |
          nix develop "$GITHUB_WORKSPACE#ci-dashboard" -c bun install --frozen-lockfile
          nix develop "$GITHUB_WORKSPACE#ci-dashboard" -c bun run lint

      - name: Dashboard
        run: nix build .#st0x-dashboard

  hooks:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git fetch fail-fast
        run: |
          git config --global http.lowSpeedLimit 524288
          git config --global http.lowSpeedTime 60

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: deploy migration invariants
        run: ./scripts/validate-deploy-migration.sh

      - name: pre-commit hooks
        run: nix develop .#ci-hooks -c pre-commit run --all-files
