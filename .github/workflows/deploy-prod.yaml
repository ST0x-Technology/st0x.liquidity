name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to deploy (must be on master)"
        required: true
        type: string
      mode:
        description: "Deployment mode"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - broker-migration

permissions:
  contents: read

jobs:
  deploy:
    environment: production
    permissions:
      # id-token lets tailscale/github-action fetch the GitHub OIDC JWT and
      # redeem it for a keyless tailnet join (no stored TS_AUTHKEY).
      id-token: write
      contents: read
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Verify tag is on master
        run: |
          git fetch --tags origin master
          if ! git rev-parse -q --verify "refs/tags/${{ inputs.tag }}" >/dev/null; then
            echo "ERROR: '${{ inputs.tag }}' is not an existing tag" >&2
            exit 1
          fi
          tag_commit="$(git rev-list -n 1 "refs/tags/${{ inputs.tag }}")"
          if ! git merge-base --is-ancestor "$tag_commit" origin/master; then
            echo "ERROR: tag ${{ inputs.tag }} is not on master" >&2
            exit 1
          fi

      - uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@v14
        continue-on-error: true

      - name: Connect to Tailscale
        # Keyless join via GitHub OIDC federation (no stored TS_AUTHKEY): the
        # runner presents its OIDC token and redeems the liquidity_deploy_production
        # federated identity for an ephemeral tag:ci node. Mirrors st0x.devops
        # health-runtime.yml. The prod bot lives on tag:st0x-liquidity; tag:ci ->
        # tag:st0x-liquidity:22 is granted in st0x.devops policy.hujson so deploy-rs
        # can SSH.
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          # From st0x.devops liquidity_deploy_production_federated_identity
          # (terraform/tailscale/liquidity-wif.tf, applied in #65). Non-secret
          # identifiers, hardcoded like st0x.devops does.
          oauth-client-id: TpQCTWg3NM11CNTRL-kuSMK7npcv11CNTRL
          audience: api.tailscale.com/TpQCTWg3NM11CNTRL-kuSMK7npcv11CNTRL
          tags: tag:ci
          hostname: liquidity-deploy-${{ github.run_id }}

      - name: Resolve deploy host via Tailscale
        run: |
          DEPLOY_HOST=$(nix eval --raw --file keys.nix tailscaleHost.prod)
          echo "DEPLOY_HOST=$DEPLOY_HOST" >> "$GITHUB_ENV"
          echo "::add-mask::$DEPLOY_HOST"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -R "$DEPLOY_HOST" >/dev/null 2>&1 || true
          echo "$DEPLOY_HOST $(nix eval --raw --file keys.nix keys.host-prod)" >> ~/.ssh/known_hosts

      - name: Warm up Tailscale tunnel
        run: |
          for attempt in {1..6}; do
            if tailscale ping --c 1 "$DEPLOY_HOST"; then
              exit 0
            fi
            echo "Tailscale ping failed on attempt $attempt; retrying..."
            sleep 5
          done
          tailscale status
          exit 1

      - name: Deploy
        if: ${{ inputs.mode == 'all' }}
        run: nix run .#prodDeployAll

      - name: Deploy NixOS system for next boot
        if: ${{ inputs.mode == 'broker-migration' }}
        run: nix run .#prodDeployNixosBoot

      - name: Record current boot ID
        if: ${{ inputs.mode == 'broker-migration' }}
        run: |
          pre_reboot_boot_id=$(ssh -o BatchMode=yes root@"$DEPLOY_HOST" 'cat /proc/sys/kernel/random/boot_id')
          if [ -z "$pre_reboot_boot_id" ]; then
            echo "Failed to read pre-reboot boot ID" >&2
            exit 1
          fi
          printf 'PRE_REBOOT_BOOT_ID=%s\n' "$pre_reboot_boot_id" >> "$GITHUB_ENV"

      - name: Reboot production host
        if: ${{ inputs.mode == 'broker-migration' }}
        run: ssh -o BatchMode=yes -o ConnectTimeout=10 root@"$DEPLOY_HOST" 'systemctl reboot' || true

      - name: Wait for production host
        if: ${{ inputs.mode == 'broker-migration' }}
        run: |
          for attempt in {1..60}; do
            current_boot_id=$(ssh -o BatchMode=yes -o ConnectTimeout=5 root@"$DEPLOY_HOST" 'cat /proc/sys/kernel/random/boot_id' 2>/dev/null || true)
            if [ -n "$current_boot_id" ] && [ "$current_boot_id" != "$PRE_REBOOT_BOOT_ID" ]; then
              exit 0
            fi
            echo "Host has not returned on a new boot after attempt $attempt; retrying..."
            sleep 10
          done
          tailscale status
          exit 1

      - name: Verify dbus-broker migration
        if: ${{ inputs.mode == 'broker-migration' }}
        run: |
          ssh -o BatchMode=yes root@"$DEPLOY_HOST" '
            set -eu
            systemctl is-active --quiet dbus-broker.service
            failed_units=$(systemctl --failed --no-legend --plain)
            if [ -n "$failed_units" ]; then
              echo "$failed_units" >&2
              exit 1
            fi
          '

      - name: Deploy all profiles after reboot
        if: ${{ inputs.mode == 'broker-migration' }}
        run: nix run .#prodDeployAll

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh/id_ed25519
