name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to deploy (must be on master)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    environment: production
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Verify tag is on master
        run: |
          git fetch --tags origin master
          if ! git rev-parse -q --verify "refs/tags/${{ inputs.tag }}" >/dev/null; then
            echo "ERROR: '${{ inputs.tag }}' is not an existing tag" >&2
            exit 1
          fi
          tag_commit="$(git rev-list -n 1 "refs/tags/${{ inputs.tag }}")"
          if ! git merge-base --is-ancestor "$tag_commit" origin/master; then
            echo "ERROR: tag ${{ inputs.tag }} is not on master" >&2
            exit 1
          fi

      - name: Compute submodule cache key
        id: sub-key
        run: echo "hash=$(git submodule status | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache submodules
        id: cache-sub
        uses: actions/cache@v4
        with:
          path: |
            lib/
            .git/modules/
          key: submodules-${{ steps.sub-key.outputs.hash }}
          restore-keys: submodules-

      - name: Checkout submodules
        run: |
          if [ "${{ steps.cache-sub.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit - trying no-fetch checkout"
            git submodule update --init --recursive --no-fetch || {
              echo "no-fetch failed - falling back to full fetch"
              git submodule update --init --recursive
            }
          else
            echo "Cache miss - full submodule fetch"
            git submodule update --init --recursive
          fi

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Resolve deploy host via Tailscale
        run: |
          DEPLOY_HOST=$(nix eval --raw --file keys.nix tailscaleHost.prod)
          echo "DEPLOY_HOST=$DEPLOY_HOST" >> "$GITHUB_ENV"
          echo "::add-mask::$DEPLOY_HOST"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Cache Solidity artifacts
        id: cache-sol
        uses: actions/cache@v4
        with:
          path: |
            lib/**/cache/
            lib/**/out/
          key: sol-artifacts-${{ hashFiles('.gitmodules', 'flake.lock', 'lib/**/*.sol', 'lib/**/foundry.toml', 'lib/**/remappings.txt') }}
          restore-keys: sol-artifacts-

      - name: Build Solidity artifacts
        if: steps.cache-sol.outputs.cache-hit != 'true'
        run: nix run .#prepSolArtifacts

      - name: Deploy
        run: nix run .#prodDeployAll

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh/id_ed25519
