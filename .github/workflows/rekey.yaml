name: Rekey Terraform Secrets

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  tf-rekey:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Compute submodule cache key
        id: sub-key
        run: echo "hash=$(git submodule status | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache submodules
        id: cache-sub
        uses: actions/cache@v4
        with:
          path: |
            lib/
            .git/modules/
          key: submodules-${{ steps.sub-key.outputs.hash }}
          restore-keys: submodules-

      - name: Checkout submodules
        run: |
          if [ "${{ steps.cache-sub.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit - trying no-fetch checkout"
            git submodule update --init --recursive --no-fetch || {
              echo "no-fetch failed - falling back to full fetch"
              git submodule update --init --recursive
            }
          else
            echo "Cache miss - full submodule fetch"
            git submodule update --init --recursive
          fi

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-gha-cache: false

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Rekey terraform secrets
        run: nix develop -c tf-rekey

      - name: Create PR with rekeyed secrets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/*.age infra/.remote.age
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            branch="chore/rekey-terraform-secrets-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$branch"
            git commit -m "chore: rekey terraform secrets"
            git push origin "$branch"
            gh pr create \
              --title "chore: rekey terraform secrets" \
              --body "Automated rekeying of terraform secrets." \
              --base master \
              --head "$branch"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh/id_ed25519
