hyperdx.api_key = "test-hyperdx-key"

[evm]
ws_rpc_url = "ws://localhost:8545"
# Required when [wallet] is configured:
base_rpc_url = "https://mainnet.base.org"
ethereum_rpc_url = "https://mainnet.infura.io"

[broker]
mode = "sandbox"
type = "alpaca-broker-api"
api_key = "test_key"
api_secret = "test_secret"
account_id = "dddddddd-eeee-aaaa-dddd-beeeeeeeeeef"

# Empty [rebalancing] section required when config has [rebalancing].
# Wallet secrets and RPC URLs have moved to [wallet] and [evm].
[rebalancing]

# Wallet secrets — backend-specific credentials.
[wallet]
private_key = "0x0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

