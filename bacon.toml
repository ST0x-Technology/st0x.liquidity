# This is a configuration file for the bacon tool
#
# Complete help on configuration: https://dystroy.org/bacon/config/
#
# You may check the current default at
#   https://github.com/Canop/bacon/blob/main/defaults/default-bacon.toml
#

default_job = "check"
env.CARGO_TERM_COLOR = "always"

wrap = false
reverse = true

[jobs.check]
need_stdout = false
command = [
  "cargo", "check",
  "--all-targets", "--all-features",
  # lib/ submodules get picked up, hence the manual list
  "-p", "st0x-hedge",
  "-p", "st0x-execution",
  "-p", "st0x-dto",
  "-p", "st0x-evm",
  "-p", "st0x-bridge",
  "-p", "st0x-event-sorcery",
  "-p", "st0x-finance",
]

[jobs.clippy]
need_stdout = true
command = [
  "cargo", "clippy", "--all-targets", "--all-features",
  "-p", "st0x-hedge",
  "-p", "st0x-execution",
  "-p", "st0x-dto",
  "-p", "st0x-evm",
  "-p", "st0x-bridge",
  "-p", "st0x-event-sorcery",
  "-p", "st0x-finance",
  "--",

  # Keep allowed lints in sync with Cargo.toml [workspace.lints.clippy]
  "-A", "clippy::doc_markdown",
  "-A", "clippy::items_after_statements",
  "-A", "clippy::missing_docs_in_private_items",
  "-A", "clippy::missing_errors_doc",
  "-A", "clippy::missing_panics_doc",
  "-A", "clippy::must_use_candidate",
  "-A", "clippy::missing_const_for_fn",
  "-A", "clippy::redundant_pub_crate",
]

[jobs.nextest]
command = [
    "cargo", "nextest", "run", "--workspace", "-P", "dev",
    "--hide-progress-bar", "--failure-output", "final"
]
need_stdout = true
analyzer = "nextest"

[jobs.e2e]
# env.RUST_LOG = "st0x_hedge=trace,st0x_execution=debug,st0x_dto=debug,st0x_event_sorcery=debug,st0x_evm=debug,st0x_finance=debug,st0x_bridge=debug,e2e=trace"
command = [
    "cargo", "nextest", "run", "--test", "e2e", "dev_harness", "--run-ignored", "only",
    "--hide-progress-bar", "--failure-output", "final"
]
need_stdout = true
analyzer = "nextest"
# allow_warnings = true
