[test-groups.e2e]
max-threads = 8

[profile.default]
slow-timeout = { period = "60s", terminate-after = 2 }

# trybuild compile-fail tests invoke rustc and may need to compile the full
# dependency tree on CI, which can exceed the default timeout
[[profile.default.overrides]]
filter = "test(compile_fail_tests)"
slow-timeout = { period = "120s", terminate-after = 3 }

# E2e tests are slow and prone to hangs — limit threads and allow more time
[[profile.default.overrides]]
filter = "binary(=e2e)"
test-group = "e2e"
slow-timeout = { period = "150s", terminate-after = 3 }
retries = { backoff = "exponential", count = 1, delay = "5s", jitter = true }

#############################################################################
# CI profile: maximum coverage, no early exit

[profile.ci]
fail-fast = false
retries = { backoff = "exponential", count = 2, delay = "1s", jitter = true }
slow-timeout = { period = "90s", terminate-after = 3 }

[[profile.ci.overrides]]
filter = "test(compile_fail_tests)"
slow-timeout = { period = "180s", terminate-after = 3 }

[[profile.ci.overrides]]
filter = "binary(=e2e)"
test-group = "e2e"
slow-timeout = { period = "600s", terminate-after = 2 }
retries = { backoff = "exponential", count = 3, delay = "5s", jitter = true }

#############################################################################
# Dev profile: fast feedback, skip e2e and slow tests

[profile.dev]
fail-fast = true
default-filter = "not binary(=e2e) & not test(slow)"
